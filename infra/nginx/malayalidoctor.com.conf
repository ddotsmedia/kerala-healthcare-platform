# Kerala Health Portal — nginx reverse proxy for malayalidoctor.com
# Place in /etc/nginx/sites-available/ and symlink into sites-enabled/.
# SSL: run `certbot --nginx -d malayalidoctor.com -d www.malayalidoctor.com \
#      -d portal.malayalidoctor.com -d admin.malayalidoctor.com`
# Certbot rewrites the SSL placeholder lines below.

# ---- shared proxy settings ----
# (inlined per location; gzip is set globally here)
gzip on;
gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
gzip_min_length 1024;
gzip_proxied any;

# ================= khp-web → malayalidoctor.com =================
server {
    listen 80;
    listen [::]:80;
    server_name malayalidoctor.com www.malayalidoctor.com;
    # certbot inserts the ACME challenge + 301 redirect to HTTPS here.
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl http2;            # ssl_certificate lines added by certbot
    listen [::]:443 ssl http2;
    server_name malayalidoctor.com www.malayalidoctor.com;
    # ssl_certificate     /etc/letsencrypt/live/malayalidoctor.com/fullchain.pem; # managed by Certbot
    # ssl_certificate_key /etc/letsencrypt/live/malayalidoctor.com/privkey.pem;   # managed by Certbot

    client_max_body_size 10m;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}

