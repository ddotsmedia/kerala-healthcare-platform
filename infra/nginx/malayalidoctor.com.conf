# ================= khp-admin → admin.malayalidoctor.com =================
server {
    listen 80;
    listen [::]:80;
    server_name admin.malayalidoctor.com;
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.malayalidoctor.com;
    # ssl_certificate     /etc/letsencrypt/live/malayalidoctor.com/fullchain.pem; # managed by Certbot
    # ssl_certificate_key /etc/letsencrypt/live/malayalidoctor.com/privkey.pem;   # managed by Certbot

    client_max_body_size 10m;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
